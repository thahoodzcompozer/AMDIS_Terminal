<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMDIS Terminal</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
        }
        .declassify {
            background-color: red;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
        }
        .glitch {
            position: relative;
            color: white;
            font-size: 2em;
        }
        .scanline {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 100%;
            background: repeating-linear-gradient(
                rgba(255, 0, 0, 0.5) 0,
                rgba(255, 0, 0, 0.5) 1px,
                transparent 1px,
                transparent 5px
            );
            pointer-events: none;
        }
    </style>
</head>
<body>
    <h1>AMDIS Terminal</h1>
    <button class="declassify">DECLASSIFY</button>
    <div class="glitch"><span>Redacted Text</span><div class="scanline"></div></div>
    <p>Contract Address: <span id="contractAddress">0xYourContractAddress</span></p>
    <script>
        const button = document.querySelector('.declassify');
        const contractAddress = document.getElementById('contractAddress');
        button.addEventListener('click', () => {
            contractAddress.textContent = "0xActualContractAddress";
            contractAddress.style.color = 'green';
        });
    </script>
</body>
</html>
