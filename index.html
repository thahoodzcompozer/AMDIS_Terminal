<html>
<head>
    <title>AMDIS Terminal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .button {
            padding: 10px 20px;
            color: white;
            background-color: #007BFF;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .button:hover {
            background-color: #0056b3;
        }
        .contract-address {
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>AMDIS Terminal</h1>
    <p>Welcome to the AMDIS Terminal. This application is designed to interact with the contract.</p>
    <button class="button" id="revealAddressBtn">Reveal Contract Address</button>
    <div class="contract-address" id="contractAddress" style="display: none;">0x1234567890abcdef1234567890abcdef12345678</div>
    <script>
        document.getElementById('revealAddressBtn').addEventListener('click', function() {
            var addressDiv = document.getElementById('contractAddress');
            addressDiv.style.display = 'block';
        });
    </script>
</body>
</html>
